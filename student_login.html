    // 보이지 않는 문자 제거 + 한글 정규화 + 공백 정리
    const killZW = s => String(s ?? "").replace(/[\u200B-\u200D\uFEFF]/g, "");
    const normK  = s => killZW(s).normalize("NFC").replace(/\s+/g, " ").trim();
    const normId = s => normK(s).toLowerCase();
    const normPw = s => killZW(s).trim();

    // SHA-256 해시 (브라우저 내장 Web Crypto API — 외부 라이브러리 불필요)
    async function sha256(str) {
      const buf = await crypto.subtle.digest(
        "SHA-256",
        new TextEncoder().encode(str)
      );
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    // 학번 기준 빠른 조회 맵
    const idMap = new Map(allowedStudents.map(s => [normId(s.id), s]));

    // 로그인 시도 횟수 제한 (5회 실패 → 30초 잠금)
    let failCount = 0;
    let lockUntil = 0;

    const submitBtn = document.getElementById("submitBtn");
    const setErr = msg => document.getElementById("errorMsg").textContent = msg;

    function startLockTimer() {
      submitBtn.disabled = true;
      const tick = () => {
        const left = Math.ceil((lockUntil - Date.now()) / 1000);
        if (left <= 0) {
          failCount = 0;
          submitBtn.disabled = false;
          setErr("");
        } else {
          setErr(`로그인이 잠겼습니다. ${left}초 후 다시 시도하세요.`);
          setTimeout(tick, 1000);
        }
      };
      tick();
    }

    document.getElementById("loginForm").addEventListener("submit", async e => {
      e.preventDefault();

      if (Date.now() < lockUntil) {
        startLockTimer();
        return;
      }

      const idInput = normId(document.getElementById("studentId").value);
      const pwHash  = await sha256(normPw(document.getElementById("studentPassword").value));

      const student = idMap.get(idInput);
      if (!student) {
        failCount++;
        setErr("학번을 다시 확인해주세요.");
      } else if (student.passwordHash !== pwHash) {
        failCount++;
        setErr("비밀번호가 일치하지 않습니다.");
      } else {
        // 로그인 성공
        sessionStorage.setItem("studentInfo", JSON.stringify({
          name: student.name,
          studentId: student.id
        }));
        window.location.href = "form.html";
        return;
      }

      if (failCount >= 5) {
        lockUntil = Date.now() + 30_000;
        startLockTimer();
      }
    });
