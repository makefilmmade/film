<script>
  // 고정된 학생 계정 목록 (이름, 학번, 비밀번호)
  const allowedStudents = [
    { name: "유영식", id: "1111", password: "1111" },
    { name: "영화학", id: "1111", password: "1111" },
    { name: "황원", id: "ar23911022", password: "9513" },

    { name: "김현수", id: "ar25730221", password: "go235858532" },
    { name: "이수현", id: "ar25051205", password: "1205" },
    { name: "오미수", id: "ar25690628", password: "3535" },

    { name: "강선구", id: "ar25021011", password: "sksk1011" },
    { name: "이민영", id: "ar25030615", password: "6891" },
    { name: "한서윤", id: "ar25040812", password: "0812" },
    { name: "전유하", id: "ar25950918", password: "1057" },
    { name: "김도엽", id: "ar25051224", password: "8888" },
    { name: "이장운", id: "ar25060630", password: "911226" },
    { name: "김창기", id: "ar25950131", password: "8192" },
    { name: "강민영", id: "ar25950725", password: "9432" },
    { name: "이상우", id: "ar25030209", password: "1083" },
    { name: "김수환", id: "ar24971120", password: "su280424@@" },
    { name: "이가을", id: "ar24031017", password: "mm061806" },
    { name: "정관희", id: "ar24050516", password: "202020" },

    { name: "신민주", id: "ar25030812", password: "minju812!" },
    { name: "배효미", id: "ar25800929", password: "4208" }
  ];

  // 보이지 않는 문자 제거 + 한글 정규화 + 공백 정리
  const killZW = (s) => s.replace(/[\u200B-\u200D\uFEFF]/g, ""); // zero-width류 제거
  const normK = (s) => killZW(String(s ?? ""))
    .normalize("NFC")        // 한글 조합 정규화
    .replace(/\s+/g, " ")    // 다중 공백 1칸
    .trim();

  // 학번은 영문소문자 고정 + 공백/ZW 제거 (입력 편차 흡수)
  const normId = (s) => normK(s).toLowerCase();

  // 비밀번호는 일반적으로 대소문자/기호를 유지하지만,
  // 실수로 앞뒤 공백이나 ZW가 들어가면 제거
  const normPw = (s) => killZW(String(s ?? "")).trim();

  // 데이터 쪽도 동일한 규칙으로 미리 정규화(룩업 맵 구성)
  const idMap = new Map();
  for (const s of allowedStudents) {
    const key = normId(s.id);
    if (!idMap.has(key)) idMap.set(key, s); // 같은 학번 중복 시 첫 항목 유지
  }

  const errorMsg = (msg) => {
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
  };

  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const nameInput = normK(document.getElementById("studentName").value);
    const idInput = normId(document.getElementById("studentId").value);
    const pwInput = normPw(document.getElementById("studentPassword").value);

    // 디버그 로그 (필요 시 F12 콘솔에서 확인)
    console.log("[LOGIN-DEBUG] input:", { nameInput, idInput, pwInput });

    const student = idMap.get(idInput);
    if (!student) {
      errorMsg("학번을 다시 확인해주세요. (공백/대소문자 주의)");
      return;
    }

    const expectedPw = normPw(student.password);
    const ok = pwInput === expectedPw;

    console.log("[LOGIN-DEBUG] foundStudent:", student, "pwMatch:", ok);

    if (ok) {
      // 이름은 목록의 정식 표기로 저장 (입력과 다른 경우도 정상화)
      localStorage.setItem("studentInfo", JSON.stringify({
        name: student.name,
        studentId: student.id
      }));

      // 리다이렉트 실패(404)를 로그인 실패로 오해하는 경우가 있어 try 처리
      try {
        window.location.href = "form.html";
      } catch (err) {
        console.error("Redirect failed:", err);
        errorMsg("로그인은 성공했지만, 이동에 실패했습니다. form.html 경로를 확인하세요.");
      }
    } else {
      errorMsg("비밀번호가 일치하지 않습니다.");
    }
  });
</script>
